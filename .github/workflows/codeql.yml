# CodeQL — GitHub's first-party static security analysis.
#
# Runs on:
#   - every push to main (catches regressions on merge)
#   - every PR to main (blocks insecure code from landing)
#   - a weekly schedule (catches issues from new CodeQL queries
#     released by GitHub even if no code changed)
#
# Free for public repos and for private repos on Team/Enterprise.
# Surfaces findings under Security → Code scanning in the GitHub UI.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 03:00 UTC — quiet window, fresh queries land Friday so
    # this catches anything new before Monday morning.
    - cron: "0 3 * * 0"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyse:
    name: Analyse JavaScript / TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` is the broadest pack — adds code-quality
          # checks on top of the default security suite. Slightly noisier
          # than `security-extended` but worth it on a small codebase.
          queries: security-and-quality

      - name: Auto-build
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
