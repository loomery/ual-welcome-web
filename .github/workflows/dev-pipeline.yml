name: Dev Pipeline
on:
  push:
    branches:
      - main
      - jackkelly/DPP-9015/task/dev-set-up-squiz-file-store-hosting-for-student-prototype-next
  workflow_dispatch:
jobs:
  build:
    runs-on: self-hosted
    env:
      DXP_ACCESS_KEY: ${{ secrets.DXP_ACCESS_KEY }}
      DXP_TENANT_ID: ${{ secrets.DXP_TENANT_ID }}
      DXP_SERVER_URL: ${{ secrets.DXP_SERVER_URL }}
    environment: dev
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22.22.0'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Compress
        run: npm run compress
      - name: Deploy to DXP
        run: node scripts/file-store.js --dev
